<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>健康管理系統</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      margin: 0; 
      padding: 12px;
      background: #f0f4f8; 
      color: #333;
    }
    
    .grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 16px; 
      max-width: 1100px; 
      margin: 0 auto; 
    }

    @media(max-width: 850px) { 
      .grid { grid-template-columns: 1fr; } 
    }
    
    .card { 
      background: #fff; 
      border-radius: 20px; 
      padding: 24px; 
      display: flex; 
      flex-direction: column; 
      border: 1px solid #e1e8ed; 
      box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1); 
    }

    .card.history { background: #fafbfc; border-left: 6px solid #6c757d; }
    .card.entry { border-left: 6px solid #1a73e8; }
    
    .title { 
      font-weight: 800; 
      font-size: 20px; 
      margin-bottom: 12px; 
      color: #1a73e8; 
    }
    
    label { 
      display: block; 
      margin: 14px 0 6px; 
      font-weight: 600; 
      font-size: 14px; 
    }

    input, select, textarea { 
      width: 100%; 
      padding: 12px; 
      border: 1.5px solid #cbd5e0; 
      border-radius: 12px; 
      font-size: 16px; 
      box-sizing: border-box; 
    }

    .radio-group { 
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .radio-group label { 
      background: #f8fafc;
      border: 1.5px solid #cbd5e0;
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
    }

    button { 
      width: 100%; 
      padding: 16px; 
      border-radius: 14px; 
      font-size: 18px; 
      font-weight: 700; 
      cursor: pointer; 
      margin-top: 20px;
    }

    #btnSubmit { background: #1a73e8; color: #fff; border: none; }
    #btnSubmit:disabled { background: #ccc; }
    .btn-query { background: #6c757d; color: #fff; border: none; }

    .msg { font-size: 14px; margin-top: 10px; text-align: center; min-height: 20px; }
    .ok { color: #2f855a; font-weight: bold; }
    .warn { color: #c53030; font-weight: bold; }
  </style>
</head>
<body>

<div class="grid">
  <div class="card entry">
    <div class="title">✍️ 本次填寫資料</div>
    
    <label>電話號碼</label>
    <input id="pR" placeholder="請輸入電話" inputmode="tel">

    <label>目前時間</label>
    <input id="R_Time" disabled>

    <label>年紀</label>
    <input id="age" type="number" inputmode="numeric">

    <label>血型</label>
    <select id="blood">
      <option value="">-- 請選擇 --</option>
      <option value="A">A 型</option>
      <option value="B">B 型</option>
      <option value="O">O 型</option>
      <option value="AB">AB 型</option>
    </select>

    <label>身高 (cm)</label>
    <input id="h" type="number" step="0.1" inputmode="decimal">

    <label>體重 (kg)</label>
    <input id="w" type="number" step="0.1" inputmode="decimal">

    <label>體溫 (°C)</label>
    <input id="temp" type="number" step="0.1" inputmode="decimal">

    <label>血壓</label>
    <input id="bp" placeholder="例如：120/80">

    <label>是否有駕照</label>
    <div class="radio-group">
      <label><input type="radio" name="license" value="是"> 是</label>
      <label><input type="radio" name="license" value="否" checked> 否</label>
    </div>

    <label>是否有咳嗽</label>
    <div class="radio-group">
      <label><input type="radio" name="cough" value="是"> 是</label>
      <label><input type="radio" name="cough" value="否" checked> 否</label>
    </div>

    <label>備註</label>
    <textarea id="note" rows="2"></textarea>

    <button id="btnSubmit" onclick="submit()">確認送出</button>
    <div id="rMsg" class="msg"></div>
  </div>

  <div class="card history">
    <div class="title">📋 上次填寫參考</div>
    
    <label>查詢電話</label>
    <input id="pL" placeholder="輸入電話後點選查詢" inputmode="tel">
    
    <label>上次填寫時間</label>
    <input id="L_Time" disabled>

    <label>年紀</label>
    <input id="L_Age" disabled>

    <label>血型</label>
    <input id="L_BloodType" disabled>

    <label>身高 (cm)</label>
    <input id="L_Height" disabled>

    <label>體重 (kg)</label>
    <input id="L_Weight" disabled>

    <label>體溫 (°C)</label>
    <input id="L_Temp" disabled>

    <label>血壓</label>
    <input id="L_BloodPressure" disabled>

    <label>是否有駕照</label>
    <input id="L_HasLicense" disabled>

    <label>是否有咳嗽</label>
    <input id="L_HasCough" disabled>

    <label>備註</label>
    <textarea id="L_Note" rows="2" disabled></textarea>

    <button class="btn-query" onclick="query()">查詢歷史資料</button>
    <div id="lMsg" class="msg"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUs4b6HiLGSHO2JwZs-OYpVH4g12MxsOBQ-eN3c60Qewb14s9_L0DCoLpPsOYNxEY4fw/exec";

  function updateRTime() {
    const now = new Date();
    $('R_Time').value = now.toLocaleString('zh-TW', { hour12: false });
  }

  updateRTime();
  setInterval(updateRTime, 30000);

  async function query() {
    const phone = $('pL').value.trim();

    if (!phone) {
      $('lMsg').innerHTML = '<span class="warn">請輸入電話</span>';
      return;
    }

    $('lMsg').textContent = '查詢中...';

    try {
      const resp = await fetch(`${GAS_URL}?phone=${encodeURIComponent(phone)}`);
      const rec = await resp.json();

      if (!rec || Object.keys(rec).length === 0) {
        $('lMsg').innerHTML = '<span class="warn">查無紀錄</span>';
        clearHistory();
        return;
      }

      $('lMsg').innerHTML = '<span class="ok">✅ 已載入歷史</span>';

      $('L_Time').value = rec.CreatedAt || '';
      $('L_Age').value = rec.Age || '';
      $('L_BloodType').value = rec.BloodType || '';
      $('L_Height').value = rec.Height || '';
      $('L_Weight').value = rec.Weight || '';
      $('L_Temp').value = rec.Temp || '';
      $('L_BloodPressure').value = rec.BloodPressure || '';
      $('L_HasLicense').value = rec.HasLicense || '';
      $('L_HasCough').value = rec.HasCough || '';
      $('L_Note').value = rec.Note || '';
    } catch (e) {
      $('lMsg').innerHTML = '<span class="warn">查詢出錯，請確認 GAS 網址或 API 回傳格式</span>';
    }
  }

  function clearHistory() {
    [
      'L_Time',
      'L_Age',
      'L_BloodType',
      'L_Height',
      'L_Weight',
      'L_Temp',
      'L_BloodPressure',
      'L_HasLicense',
      'L_HasCough',
      'L_Note'
    ].forEach(id => $(id).value = '');
  }

  async function submit() {
    const phone = $('pR').value.trim();

    if (!phone) {
      $('rMsg').innerHTML = '<span class="warn">❌ 請填寫電話</span>';
      return;
    }

    const btn = $('btnSubmit');
    btn.disabled = true;
    btn.innerText = '傳送中...';
    $('rMsg').textContent = '正在儲存到雲端...';

    const payload = {
      Phone: phone,
      Age: $('age').value,
      BloodType: $('blood').value,
      Height: $('h').value,
      Weight: $('w').value,
      Temp: $('temp').value,
      BloodPressure: $('bp').value,
      HasLicense: document.querySelector('input[name="license"]:checked').value,
      HasCough: document.querySelector('input[name="cough"]:checked').value,
      Note: $('note').value,
      UserAgent: navigator.userAgent
    };

    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });

      $('rMsg').innerHTML = '<span class="ok">🎉 送出成功！</span>';
      $('pL').value = phone;
      query();

      ['age', 'blood', 'h', 'w', 'temp', 'bp', 'note'].forEach(id => $(id).value = '');
      document.querySelector('input[name="license"][value="否"]').checked = true;
      document.querySelector('input[name="cough"][value="否"]').checked = true;
    } catch (e) {
      $('rMsg').innerHTML = '<span class="warn">儲存失敗，請再試一次</span>';
    } finally {
      btn.disabled = false;
      btn.innerText = '確認送出';
    }
  }
</script>
</body>
</html>
