<script>
  const $ = id => document.getElementById(id);
  // *** 請在此處填入你部署後的 Web App URL ***
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxmu9xH-kRuQPrYz6CFLi0UOgcDkr-UGQUqPFDkdNbctx2tpOJT-GnuKelouhhX6lcF-A/exec";  

  function updateRTime(){
    $('R_Time').value = new Date().toLocaleString('zh-TW', { hour12: false });
  }
  updateRTime();
  setInterval(updateRTime, 30000);

  async function query() {
    const phone = $('pL').value.trim();
    if(!phone) return $('lMsg').innerHTML = '<span class="warn">請輸入電話</span>';
    $('lMsg').textContent = '查詢中...';
    
    try {
      const resp = await fetch(`${GAS_URL}?phone=${phone}`);
      const rec = await resp.json();
      
      if(!rec) {
        $('lMsg').innerHTML = '<span class="warn">查無紀錄</span>';
        return;
      }
      $('lMsg').innerHTML = '<span class="ok">✅ 已載入歷史</span>';
      $('L_Time').value = new Date(rec.CreatedAt).toLocaleString('zh-TW', { hour12: false });
      $('L_Age').value = rec.Age || '';
      $('L_BloodType').value = rec.BloodType || '';
      $('L_Height').value = rec.Height || '';
      $('L_Weight').value = rec.Weight || '';
      $('L_BP').value = rec.BloodPressure || '';
      $('L_Temp').value = rec.Temp || '';
      $('L_License').value = rec.HasLicense || '';
      $('L_Cough').value = rec.HasCough || '';
      $('L_Note').value = rec.Note || '';
    } catch (e) {
      $('lMsg').innerHTML = '<span class="warn">查詢出錯</span>';
    }
  }

  async function submit() {
    const phone = $('pR').value.trim();
    if(!phone) return $('rMsg').innerHTML = '<span class="warn">❌ 請填寫電話</span>';
    
    const payload = {
      Phone: phone,
      Age: $('age').value,
      BloodType: $('blood').value,
      Height: $('h').value,
      Weight: $('w').value,
      BloodPressure: $('bp').value,
      Temp: $('temp').value,
      HasLicense: document.querySelector('input[name="license"]:checked').value,
      HasCough: document.querySelector('input[name="cough"]:checked').value,
      Note: $('note').value,
      UserAgent: navigator.userAgent
    };

    $('rMsg').textContent = '正在儲存中...';
    
    try {
      // GAS POST 必須使用 no-cors 以外的模式，並處理 redirect
      await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors", // 這裡使用 no-cors 是因為 GAS 不支援標準 CORS POST
        body: JSON.stringify(payload)
      });
      
      // 由於 no-cors 無法取得回傳值，我們直接假設成功並重新查詢
      $('rMsg').innerHTML = '<span class="ok">🎉 送出成功！</span>';
      $('pL').value = phone;
      query(); 
      ['age','h','w','bp','temp','note'].forEach(id => $(id).value = '');
    } catch (e) {
      $('rMsg').innerHTML = '<span class="warn">儲存失敗</span>';
    }
  }
</script>
