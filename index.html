<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>健康管理系統 - 鼻科診斷追蹤</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      margin: 0; padding: 16px; background: #f0f4f8; color: #333;
    }
    .main-container { max-width: 1600px; margin: 0 auto; }
    .card { 
      background: #fff; border-radius: 16px; padding: 24px; border: 1px solid #e1e8ed; 
      box-shadow: 0 4px 12px rgba(149, 157, 165, 0.1); margin-bottom: 20px;
    }
    .card.history { background: #f8fafc; border-left: 6px solid #64748b; }
    .card.entry { background: #fff; border-left: 6px solid #1a73e8; }
    
    .title { 
      font-weight: 800; font-size: 22px; margin-bottom: 20px; color: #1a73e8; 
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid #f0f4f8; padding-bottom: 10px;
    }
    .section-title {
      font-size: 16px; font-weight: 700; color: #2d3748; margin-bottom: 15px;
      padding-left: 8px; border-left: 4px solid #cbd5e0;
    }
    label { display: block; margin: 8px 0 4px; font-weight: 600; font-size: 13px; color: #4a5568; }
    input, select, textarea { 
      width: 100%; padding: 12px; border: 1.5px solid #cbd5e0; border-radius: 8px; 
      font-size: 15px; box-sizing: border-box; background: white;
    }
    input:focus { border-color: #1a73e8; outline: none; }
    input:disabled { background: #edf2f7; color: #718096; cursor: not-allowed; }

    .symptom-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f1f5f9;
    }
    .score-badge {
      background: #edf2f7; padding: 4px 10px; border-radius: 8px;
      font-weight: bold; min-width: 32px; text-align: center; color: #1a73e8;
    }
    .symptom-label {
      flex: 1;
      min-width: 0;
      padding-right: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }
    .symptom-control {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-toggle { background: #e2e8f0; color: #475569; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    .btn-save { background: #059669; color: white; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 700; }
    .btn-patient-mode { background: #d97706; color: white; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 700; }
    .btn-submit { background: #1a73e8; color: white; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; }

    .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
    @media(max-width: 1024px) { .profile-grid { grid-template-columns: 1fr; } }


    /* 密碼彈窗 */
    .password-modal-backdrop {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55);
      display: none; align-items: center; justify-content: center; z-index: 9999;
      padding: 16px;
    }
    .password-modal {
      width: 100%; max-width: 380px; background: #fff; border-radius: 18px;
      padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    .password-error { color: #dc2626; font-weight: 700; font-size: 14px; min-height: 22px; }


    /* 摺疊內容控制 */
    #adminContent { display: none; overflow: hidden; transition: max-height 0.3s ease-out; }
    #patientCardSummary { display: none; }
  </style>
</head>
<body>

<div class="main-container">
  
  <!-- 患者基本資料管理 (摺疊設計) -->
  <div class="card border-2 border-blue-100" id="adminSection">
    <div class="flex justify-between items-center">
      <div class="title" style="margin-bottom:0; border:none; padding:0;">
        <span>📁 患者基本資料管理</span>
      </div>
      <button id="toggleBtn" class="btn-toggle" onclick="toggleAdminContent()">➕ 展開編輯資料</button>
    </div>

 
    <div id="adminContent">	
      <div class="bg-blue-50 p-4 rounded-xl my-6 flex gap-4 items-end">
        <div class="flex-1">
         <label>快速搜尋患者（病歷號或姓名）</label>
         <input id="searchKey" placeholder="輸入病歷號或姓名後點擊搜尋...">
        </div>
        <button class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold" onclick="searchPatient()">搜尋載入</button>
      </div>
      <div id="adminMsg" class="msg text-center mt-4"></div>
      <div class="profile-grid">
	
      
        <!-- 第一區：身分 -->
        <div class="space-y-2">
          <div class="section-title text-blue-600">一、身分與年齡</div>
         <div class="field-group"><label>病歷號（唯一識別，一樣更新，不一樣新增）</label><input id="chartNo"></div>
          <div class="grid grid-cols-2 gap-3">
              <div class="field-group"><label>Gender</label><select id="gender"><option value="Male">男</option><option value="Female">女</option></select></div>
            <div class="field-group"><label>姓名</label><input id="name"></div>
          </div>
             <div class="col-span-3">
          <div class="field-group">
           <label>電話號碼</label>
           <input id="phone">	
          </div>
		  	 
        </div>
          <div class="field-group"><label>西元出生年月日</label><input id="dob" type="date" onchange="calculateAges()"></div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>OP Age</label><input id="opAge" readonly disabled></div>
            <div class="field-group"><label>Now AGE</label><input id="nowAge" readonly disabled></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
          
            <div class="field-group"><label>手術日期</label><input id="opDate" type="date" onchange="calculateAges()"></div>
          </div>
          <div class="field-group"><label>Side (雙0單1)</label><input id="side"></div>
        </div>

        <!-- 第二區：檢驗 -->
        <div class="space-y-2">
          <div class="section-title text-green-600">二、臨床檢驗指標</div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>NP (0/1有)</label><input id="np"></div>
            <div class="field-group"><label>診斷</label><input id="diagnosis"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>steroid</label><input id="steroid"></div>
            <div class="field-group"><label>Macrolide(0.1)</label><input id="macrolide"></div>
          </div>
          <div class="field-group"><label>Mac'(Clarithromycin 1)</label><input id="clarithromycin"></div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>IgE</label><input id="ige"></div>
            <div class="field-group"><label>Eosinophil</label><input id="eosinophil"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>Eosinophil's 個數</label><input id="eosinophil_count"></div>
            <div class="field-group"><label>Peripheral eosinophil</label><input id="peripheral_eosinophil"></div>
          </div>
        </div>

        <!-- 第三區：風險 -->
        <div class="space-y-2">
          <div class="section-title text-red-600">三、風險因子與備註</div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>MAST(0/1)</label><input id="mast"></div>
            <div class="field-group"><label>previous OP(0/1)</label><input id="prev_op"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>Asthma(0/1)</label><input id="asthma"></div>
            <div class="field-group"><label>Drug Allergy(0/1)</label><input id="drug_allergy"></div>
          </div>
          <div class="field-group"><label>Drug Allergy'</label><input id="allergy_detail"></div>
          <div class="grid grid-cols-2 gap-3">
            <div class="field-group"><label>Smoking(0/1)</label><input id="smoking"></div>
            <div class="field-group"><label>Smoking'</label><input id="smoking_detail"></div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div class="field-group"><label>LM score(R)</label><input id="lm_r"></div>
            <div class="field-group"><label>LM score(L)</label><input id="lm_l"></div>
            <div class="field-group"><label>Polyp grading(R)</label><input id="polyp_r"></div>
          </div>
          
        </div>
       
      </div>
 <div class="field-group"><label>基本病史</label><textarea id="history" rows="2"></textarea></div>
      <div class="mt-8 flex gap-4">
        <button class="btn-save flex-1" onclick="saveProfile()">💾 存檔基本資料</button>
        <button class="btn-patient-mode flex-1" onclick="switchToPatientMode()">🚀 開啟病患追蹤模式</button>
      </div>
     
    </div>
  </div>

  <!-- 病患專屬確認卡 (開啟追蹤模式後出現) -->
  <div id="patientCardSummary" class="card bg-gradient-to-r from-blue-700 to-indigo-800 text-white border-none shadow-xl">
    <div class="flex justify-between items-center">
      <div>
        <div class="text-sm opacity-80">您好，請確認身分並開始填寫：</div>
        <div class="text-3xl font-bold mt-1" id="p_disp_name">載入中...</div>
        <div class="text-lg opacity-90 mt-1" id="p_disp_chart">Chart No. --------</div>
      </div>
      <div class="text-right">
        <div class="text-sm opacity-80">填寫日期</div>
        <div class="text-xl font-bold" id="p_disp_date">2024-01-01</div>
        <button class="mt-4 text-sm bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full backdrop-blur-sm border border-white/30 transition-all" onclick="exitPatientMode()">⬅️ 返回醫護管理</button>
      </div>
    </div>
  </div>

  <!-- 下方雙欄 -->
  <div class="grid lg:grid-cols-2 gap-6">
    
    <!-- 左側：歷史紀錄 -->
    <div class="card history">
      <div class="title">🔍 歷史紀錄查詢</div>
      <div class="flex gap-2 items-end mb-6">      
        <div class="flex-1">
          <label>選擇日期</label>
          <input id="qDate" type="date">
        </div>
        <button class="bg-slate-600 text-white px-4 py-3 rounded-lg h-[48px] font-bold" onclick="queryHistory()">查詢</button>
 
      </div>
      <div id="lMsg" class="msg mb-2"></div>
      <div class="opacity-75">
        <div class="font-bold text-gray-500 border-b pb-1 mb-2">歷史 VAS 評分</div>
        <div id="L_vas-fields"></div>
        <div class="font-bold text-gray-500 border-b pb-1 mt-6 mb-2">歷史 SNOT-22 評分</div>
        <div id="L_snot-fields"></div>
        <div class="mt-6">
          <label>歷史症狀備註</label>
          <textarea id="historyNote" rows="2" placeholder="查詢歷史紀錄後顯示備註..." readonly></textarea>
        </div>
      </div>
    </div>

    <!-- 右側：新增本次紀錄 -->
    <div class="card entry">
      <div class="title">✍️ 新增本次追蹤評估</div>
      <div class="field-group mb-6" id="trackDateGroup">
        <label>本次追蹤日期</label>
        <input id="trackDate" type="date">
      </div>
      <div class="font-bold text-blue-700 mb-2">一、VAS 自覺症狀評分 (0-10)</div>
      <div id="vas-fields"></div>
      <div class="font-bold text-blue-700 mt-6 mb-2">二、SNOT-22 生活品質評估 (0-5)</div>
      <div id="snot-fields"></div>
      <div class="mt-6">
        <label>本次症狀備註</label>
        <textarea id="note" rows="2" placeholder="紀錄今日特殊不適狀況..."></textarea>
      </div>
      <button id="btnSubmit" class="btn-submit mt-6" onclick="submit()">確認送出本次紀錄</button>
      <div id="rMsg" class="msg text-center mt-4"></div>
    </div>

  </div>
</div>


<!-- 密碼輸入彈窗 -->
<div id="passwordModal" class="password-modal-backdrop">
  <div class="password-modal">
    <div class="text-xl font-extrabold text-slate-800 mb-2">🔐 請輸入管理密碼</div>
    <div class="text-sm text-slate-500 mb-4">輸入正確密碼後，才能展開編輯基本資料。</div>

    <label>管理密碼</label>
    <input id="adminPassword" type="password" placeholder="請輸入密碼" onkeydown="handlePasswordKeydown(event)">
    <div id="passwordMsg" class="password-error mt-2"></div>

    <div class="flex gap-3 mt-5">
      <button class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold" onclick="closePasswordModal()">取消</button>
      <button class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold" onclick="confirmPassword()">確認</button>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const GAS_URL = "https://script.google.com/macros/s/AKfycbw42ByYXmpZgBpk-dxW85g8boELe-0Lqz2CAy-mzIbwgkA-Bamj05yYDS_uY_bEG3Tu/exec";
  let isAdminUnlocked = false;
  let loadedPatient = null;
  let isPatientMode = false;

  const vasItems = ["鼻塞", "流鼻涕", "鼻涕倒流", "嗅覺低下", "頭痛", "臉部疼痛", "頭部腫脹", "鼻部臭味", "咳嗽", "鼻音變化"];
  const snotItems = ["擤鼻涕", "打噴嚏", "流鼻涕", "鼻塞", "嗅覺喪失", "咳嗽", "鼻涕倒流", "濃稠分泌物", "耳朵悶塞", "頭昏頭痛", "耳痛", "臉部疼痛", "入睡困難", "夜間醒來", "睡品不佳", "起床覺累", "疲勞", "生產力降", "注意力低", "挫折易怒", "悲傷憂愁", "侷促不安"];

  window.onload = function() {
    const today = todayString();
    $('trackDate').value = today;
    $('p_disp_date').innerText = today;
    initScales();
    resetToInitialState();
    createExcelStatusBadge();
    checkExcelConnection();
  };

  // 回到初始畫面：基本資料收合、資料清空、追蹤模式關閉
  function resetToInitialState() {
    isAdminUnlocked = false;
    loadedPatient = null;
    isPatientMode = false;

    $('adminContent').style.display = 'none';
    $('toggleBtn').innerHTML = "➕ 展開編輯資料";
    $('patientCardSummary').style.display = 'none';

    clearProfileForm();
    clearHistoryResult();
    clearSurveyForm();

    $('adminMsg').innerHTML = '';
    $('lMsg').innerHTML = '';
    $('rMsg').innerHTML = '';
    $('searchKey').value = '';   
    $('qDate').value = '';
    showHistoryChartInput(true);
    $('chartNo').disabled = false;
    $('opAge').disabled = false;
    $('opAge').readOnly = false;
    $('history').rows = 5;
  }


  function createExcelStatusBadge() {
    if ($('excelStatusBadge')) return;

    const badge = document.createElement('div');
    badge.id = 'excelStatusBadge';
    badge.style.position = 'fixed';
    badge.style.right = '16px';
    badge.style.bottom = '16px';
    badge.style.zIndex = '9998';
    badge.style.padding = '10px 14px';
    badge.style.borderRadius = '999px';
    badge.style.fontWeight = '800';
    badge.style.fontSize = '14px';
    badge.style.boxShadow = '0 8px 20px rgba(0,0,0,.15)';
    badge.style.background = '#e2e8f0';
    badge.style.color = '#475569';
    badge.innerText = '🟡 Excel 連線檢查中';
    document.body.appendChild(badge);
  }

  function setExcelStatus(ok, text) {
    const badge = $('excelStatusBadge');
    if (!badge) return;

    badge.innerText = ok ? `🟢 ${text}` : `🔴 ${text}`;
    badge.style.background = ok ? '#dcfce7' : '#fee2e2';
    badge.style.color = ok ? '#166534' : '#991b1b';
  }

  async function checkExcelConnection() {
    try {
      const resp = await fetch(`${GAS_URL}?action=testConnection&t=${Date.now()}`);
      const result = await resp.json();
      setExcelStatus(!!result.success, result.success ? '已連到 Excel' : 'Excel 連線失敗');
    } catch (e) {
      setExcelStatus(false, 'Excel 連線失敗');
    }
  }

  function todayString() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function parseYmd(value) {
    if (!value) return null;
    const parts = String(value).substring(0, 10).split('-').map(Number);
    if (parts.length !== 3 || parts.some(isNaN)) return null;
    return { year: parts[0], month: parts[1], day: parts[2] };
  }

  function showHistoryChartInput(show) {
    const input = $('qChartNo');
    if (!input) return;
    const wrapper = input.closest('.flex-1');
    if (wrapper) wrapper.style.display = show ? '' : 'none';
  }

  function clearProfileForm() {
    const ids = [
      'phone', 'name', 'dob', 'opAge', 'nowAge', 'chartNo', 'opDate', 'side',
      'np', 'diagnosis', 'steroid', 'macrolide', 'clarithromycin', 'ige',
      'eosinophil', 'eosinophil_count', 'peripheral_eosinophil', 'mast',
      'prev_op', 'asthma', 'drug_allergy', 'allergy_detail', 'smoking',
      'smoking_detail', 'lm_r', 'lm_l', 'polyp_r', 'history'
    ];

    ids.forEach(id => {
      if ($(id)) $(id).value = '';
    });

    if ($('gender')) $('gender').value = 'Male';
  }

  function clearHistoryResult() {
    document.querySelectorAll('#L_vas-fields .score-badge, #L_snot-fields .score-badge')
      .forEach(x => x.innerText = '0');

    document.querySelectorAll('#L_vas-fields input, #L_snot-fields input')
      .forEach(x => x.value = 0);

    if ($('historyNote')) $('historyNote').value = '';
  }

  function clearSurveyForm() {
    const today = todayString();
    $('trackDate').value = today;
    $('p_disp_date').innerText = today;
    $('note').value = '';

    document.querySelectorAll('.vas-input, .snot-input').forEach(input => {
      input.value = 0;
      if (input.nextElementSibling) input.nextElementSibling.innerText = '0';
    });
  }

  // 摺疊/展開切換：第一次展開需輸入管理密碼
  function toggleAdminContent() {
    const content = $('adminContent');
    const btn = $('toggleBtn');

    if (content.style.display === 'block') {
      content.style.display = 'none';
      btn.innerHTML = "➕ 展開編輯資料";
      isAdminUnlocked = false;
      return;
    }

    if (!isAdminUnlocked) {
      openPasswordModal();
      return;
    }

    openAdminContent();
  }

  function openAdminContent() {
    $('adminContent').style.display = 'block';
    $('toggleBtn').innerHTML = "➖ 收合資料區塊";
  }

  function openPasswordModal() {
    $('passwordModal').style.display = 'flex';
    $('adminPassword').value = '';
    $('passwordMsg').innerText = '';
    setTimeout(() => $('adminPassword').focus(), 50);
  }

  function closePasswordModal() {
    $('passwordModal').style.display = 'none';
  }

  function closePasswordModalByBackdrop(event) {
    if (event.target.id === 'passwordModal') closePasswordModal();
  }

  function handlePasswordKeydown(event) {
    if (event.key === 'Enter') confirmPassword();
    if (event.key === 'Escape') closePasswordModal();
  }

  async function confirmPassword() {
    const pwd = $('adminPassword').value.trim();

    if (!pwd) {
      $('passwordMsg').innerText = '請輸入密碼';
      $('adminPassword').focus();
      return;
    }

    $('passwordMsg').innerText = '驗證中...';

    try {
      const resp = await fetch(`${GAS_URL}?action=verifyPassword&password=${encodeURIComponent(pwd)}`);
      const result = await resp.json();

      if (!result.success) {
        $('passwordMsg').innerText = result.message || '密碼錯誤，請重新輸入';
        $('adminPassword').select();
        return;
      }

      isAdminUnlocked = true;
      loadedPatient = null;
      clearProfileForm();
      clearHistoryResult();
      clearSurveyForm();
      $('adminMsg').innerHTML = '';
      $('searchKey').value = '';
      closePasswordModal();
      openAdminContent();
    } catch (e) {
      $('passwordMsg').innerText = '無法連線驗證密碼，請稍後再試';
    }
  }

  // 開啟病患模式
  function switchToPatientMode() {
    const name = $('name').value.trim();
    const chart = $('chartNo').value.trim();

    if (!loadedPatient || !loadedPatient.Name) return alert("請先搜尋並載入患者姓名後，才能開啟追蹤模式");
    if (!name) return alert("請先確認患者姓名");
    if (!chart) return alert("請先填寫或搜尋病歷號");

   const loadedChart = String(loadedPatient.ChartNo || '').trim();

if (loadedChart !== chart) {
  return alert("目前病歷號不是已搜尋到的患者，請重新搜尋患者");
}

    isPatientMode = true;
    $('chartNo').disabled = true;

    // 關閉醫護區
    $('adminContent').style.display = 'none';
    $('toggleBtn').innerHTML = "➕ 展開編輯資料";

    // 顯示病患確認卡
    $('patientCardSummary').style.display = 'block';
   const phone = $('phone').value.trim();
   $('p_disp_name').innerText = name;
   $('p_disp_chart').innerText = "Chart No. " + chart;
   $('p_disp_chart').innerHTML += `<br>📞 ${phone}`;

    // 連動同步
    $('qDate').value = todayString();
    showHistoryChartInput(false);

    // 移動視角
    window.scrollTo({ top: $('patientCardSummary').offsetTop - 20, behavior: 'smooth' });
  }

  function exitPatientMode() {
    isPatientMode = false;
    $('chartNo').disabled = false;
    showHistoryChartInput(true);
    $('patientCardSummary').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 初始化量表
  function initScales() {
    const configs = [
      { id: 'vas-fields', items: vasItems, max: 10, prefix: '' },
      { id: 'snot-fields', items: snotItems, max: 5, prefix: '' },
      { id: 'L_vas-fields', items: vasItems, max: 10, prefix: 'L_' },
      { id: 'L_snot-fields', items: snotItems, max: 5, prefix: 'L_' }
    ];
    configs.forEach(c => {
      const el = $(c.id);
      const isHist = c.prefix === 'L_';
      el.innerHTML = '';
      c.items.forEach(item => {
        el.innerHTML += `
          <div class="symptom-row">
            <span class="symptom-label">${item}</span>
            <div class="symptom-control">
              <input type="range" class="${isHist ? '' : (c.max===10?'vas-input':'snot-input')} w-32 cursor-pointer" 
                min="0" max="${c.max}" value="0" ${isHist ? 'disabled' : `oninput="this.nextElementSibling.innerText=this.value"`}>
              <span class="score-badge">0</span>
            </div>
          </div>`;
      });
    });
  }

  function calculateAges() {
    const dobParts = parseYmd($('dob').value);

    if (!dobParts) {
      $('nowAge').value = '';
      return;
    }

    const today = new Date();
    let age = today.getFullYear() - dobParts.year;
    const currentMonth = today.getMonth() + 1;
    const currentDay = today.getDate();

    if (currentMonth < dobParts.month || (currentMonth === dobParts.month && currentDay < dobParts.day)) {
      age--;
    }

    $('nowAge').value = age >= 0 ? age : '';
  }

  // 串接搜尋
  async function searchPatient() {
  const key = $('searchKey').value.trim();

  if (!key) return alert("請先輸入病歷號或姓名");

  $('adminMsg').innerHTML = "⏳ 正在用病歷號或姓名搜尋中...";

  try {
    const resp = await fetch(`${GAS_URL}?search=${encodeURIComponent(key)}`);
    const data = await resp.json();

    if (data && data.ChartNo) {
      fillData(data);
      loadedPatient = data;
      $('adminMsg').innerHTML = "<span class='text-green-600 font-bold'>✅ 載入成功</span>";
    } else {
      loadedPatient = null;
      clearProfileForm();
      $('adminMsg').innerHTML = "<span class='text-red-600 font-bold'>⚠️ 查無此病歷號或姓名，資料已清空</span>";
    }
  } catch (e) {
    $('adminMsg').innerHTML = "❌ 無法連線至雲端服務";
  }
}

  function fillData(d) {
    const mapping = {
      phone: 'Phone', chartNo: 'ChartNo', name: 'Name', gender: 'Gender', dob: 'DOB', opAge: 'OPAge', opDate: 'OPDate',
      side: 'Side', np: 'NP', diagnosis: 'Diagnosis', steroid: 'Steroid',
      macrolide: 'Macrolide', clarithromycin: 'Clarithromycin', ige: 'IgE',
      eosinophil: 'Eosinophil', eosinophil_count: 'Eosinophil_Count',
      peripheral_eosinophil: 'Peripheral_Eosinophil', mast: 'MAST', prev_op: 'Prev_OP',
      asthma: 'Asthma', drug_allergy: 'Drug_Allergy', allergy_detail: 'Allergy_Detail',
      smoking: 'Smoking', smoking_detail: 'Smoking_Detail', lm_r: 'LM_R',
      lm_l: 'LM_L', polyp_r: 'Polyp_R', history: 'HistoryNote'
    };
    for(let id in mapping) { if($(id)) $(id).value = d[mapping[id]] || ''; }
    calculateAges();
  }

  // 存檔基本資料
  async function saveProfile() {
   const phone = $('phone').value.trim();
   const chart = $('chartNo').value.trim();
   const name = $('name').value.trim();

if (!chart) return alert("請先填寫病歷號");
if (!name) return alert("請先填寫姓名");

    $('adminMsg').innerHTML = "💾 正在同步基本資料至雲端...";
    const payload = { 
        action: "updateProfile", 
        Phone: phone,
        ChartNo: chart, 
        Name: name, 
        Gender: $('gender').value,
        DOB: $('dob').value,
        OPAge: $('opAge').value,
        OPDate: $('opDate').value,
        Side: $('side').value,
        NP: $('np').value,
        Diagnosis: $('diagnosis').value,
        Steroid: $('steroid').value,
        Macrolide: $('macrolide').value,
        Clarithromycin: $('clarithromycin').value,
        IgE: $('ige').value,
        Eosinophil: $('eosinophil').value,
        Eosinophil_Count: $('eosinophil_count').value,
        Peripheral_Eosinophil: $('peripheral_eosinophil').value,
        MAST: $('mast').value,
        Prev_OP: $('prev_op').value,
        Asthma: $('asthma').value,
        Drug_Allergy: $('drug_allergy').value,
        Allergy_Detail: $('allergy_detail').value,
        Smoking: $('smoking').value,
        Smoking_Detail: $('smoking_detail').value,
        LM_R: $('lm_r').value,
        LM_L: $('lm_l').value,
        Polyp_R: $('polyp_r').value,
        HistoryNote: $('history').value 
    };
    try {
      await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
      loadedPatient = payload;
      $('adminMsg').innerHTML = "<span class='text-green-600 font-bold'>✅ 基本資料已存檔</span>";
    } catch(e) { $('adminMsg').innerHTML = "❌ 存檔失敗"; }
  }
  
  async function queryLastHistoryDate() {
  const chart = $('chartNo').value.trim();

  if (!chart) {
    return alert("請先載入患者或填寫病歷號");
  }

  $('lMsg').textContent = '正在查詢最後一次紀錄日期...';

  try {
    const resp = await fetch(`${GAS_URL}?action=lastTrackingDate&chart=${encodeURIComponent(chart)}`);
    const result = await resp.json();

    if (!result || !result.success || !result.TrackDate) {
      $('lMsg').innerHTML = '<span class="text-orange-600 font-bold">⚠️ 找不到最後一次追蹤紀錄</span>';
      return;
    }

    $('qDate').value = result.TrackDate;
    $('lMsg').innerHTML = `<span class="text-green-600 font-bold">✅ 最後一次紀錄日期：${result.TrackDate}</span>`;

    queryHistory();

  } catch (e) {
    $('lMsg').textContent = '查詢最後一次紀錄失敗';
  }
}

  // 查詢歷史紀錄
  async function queryHistory() {
    const chart = ($('chartNo').value).trim();
    const date = $('qDate').value || todayString();
    $('qDate').value = date;
    if(!chart || !date) return alert("請先載入患者並選擇日期");
    $('lMsg').textContent = '正在讀取歷程數據...';
    try {
      const resp = await fetch(`${GAS_URL}?chart=${encodeURIComponent(chart)}&date=${date}`);
      const rec = await resp.json();
      if(!rec || !rec.vasScores) {
        if ($('historyNote')) $('historyNote').value = '';
        return ($('lMsg').innerHTML = '<span class="text-orange-600 font-bold">⚠️ 該日無追蹤數據</span>');
      }
      $('lMsg').innerHTML = '<span class="text-green-600 font-bold">✅ 歷史紀錄載入成功</span>';
      const lVas = document.querySelectorAll('#L_vas-fields .score-badge');
      const lSnot = document.querySelectorAll('#L_snot-fields .score-badge');
      const lVasR = document.querySelectorAll('#L_vas-fields input');
      const lSnotR = document.querySelectorAll('#L_snot-fields input');
      rec.vasScores.forEach((s, i) => { if(lVas[i]) { lVas[i].innerText = s; lVasR[i].value = s; } });
      rec.snotScores.forEach((s, i) => { if(lSnot[i]) { lSnot[i].innerText = s; lSnotR[i].value = s; } });
      if ($('historyNote')) $('historyNote').value = rec.Note || '無備註';
    } catch(e) { $('lMsg').textContent = '載入失敗'; }
  }

  // 提交追蹤量表
  async function submit() {
    const chart = $('chartNo').value;
    if(!chart) return alert("病歷號不明，請先在上方載入患者");
    const btn = $('btnSubmit');
    btn.disabled = true; btn.innerText = '傳送數據中...';
    const vasScores = Array.from(document.querySelectorAll('.vas-input')).map(i => parseInt(i.value));
    const snotScores = Array.from(document.querySelectorAll('.snot-input')).map(i => parseInt(i.value));
    const payload = {
      action: "submitSurvey", ChartNo: chart, TrackDate: $('trackDate').value,
      vasScores: vasScores,
      snotScores: snotScores,
      VAS0: vasScores.reduce((sum, value) => sum + value, 0),
      SNOT0: snotScores.reduce((sum, value) => sum + value, 0),
      Note: $('note').value
    };
    try {
      await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
      resetToInitialState();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      alert("本次評估已成功存檔");
    } catch(e) { $('rMsg').innerHTML = '❌ 送出失敗'; }
    finally { btn.disabled = false; btn.innerText = '確認送出本次紀錄'; }
  }
</script>
